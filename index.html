<style>
body{

.card{

  font-size:15px;
  font-weight:500;

.btn i{

}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 6px 18px rgba(0,0,0,0.25);

hr{

  border-top:1px solid #ddd;

  font-weight:600;
